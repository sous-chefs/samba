---
driver: { name: vagrant }
verifier: { name: inspec }

provisioner:
  name: chef_zero
  deprecations_as_errors: true
  product_name: cinc
  product_version: <%= ENV['CHEF_VERSION'] || 'current' %>
  install_strategy: always
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>
  multiple_converge: 2

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: fedora-latest
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: server
    run_list:
      - recipe[test::server]
